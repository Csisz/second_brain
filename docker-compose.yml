version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: second_brain_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  api:
    build: .
    container_name: second_brain_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - qdrant
    volumes:
      - ./data:/app/data
    restart: unless-stopped

volumes:
  qdrant_data:
